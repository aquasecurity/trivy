name: trivy-kubernetes-cluster

on:
  workflow_dispatch:
    inputs:
      namespace:
        description: Optional namespace to scope the scan
        required: false
        default: ''
  schedule:
    - cron: '11 4 * * 6'

permissions:
  contents: read

jobs:
  k8s-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Trivy
        run: |
          set -euo pipefail
          curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sudo sh -s -- -b /usr/local/bin
          trivy --version

      - name: Write kubeconfig
        run: |
          set -euo pipefail
          install -d -m 700 ~/.kube
          printf '%s' '${{ secrets.KUBECONFIG }}' > ~/.kube/config
          chmod 600 ~/.kube/config

      - name: Scan Kubernetes cluster
        env:
          NAMESPACE: ${{ github.event.inputs.namespace }}
        run: |
          namespace_args=()
          if [ -n "$NAMESPACE" ]; then
            namespace_args+=(--include-namespaces "$NAMESPACE")
          fi
          trivy k8s \
            --kubeconfig ~/.kube/config \
            --report summary \
            --severity HIGH,CRITICAL \
            --format json \
            --output trivy-k8s.json \
            "${namespace_args[@]}" \
            cluster
          trivy k8s \
            --kubeconfig ~/.kube/config \
            --report summary \
            --severity HIGH,CRITICAL \
            --exit-code 1 \
            "${namespace_args[@]}" \
            cluster

      - name: Upload Kubernetes scan artifacts
        uses: actions/upload-artifact@v4
        with:
          name: trivy-k8s-artifacts
          path: trivy-k8s.json
