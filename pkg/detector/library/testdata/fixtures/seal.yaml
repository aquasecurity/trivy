- bucket: "seal pip::Seal Security Database"
  pairs:
    # Renamed package: seal-$name
    - bucket: "seal-requests"
      pairs:
        - key: "CVE-2023-32681"
          value:
            PatchedVersions:
              - "2.14.2+sp999"
            VulnerableVersions:
              - ">= 2.14.2+sp1, < 2.14.2+sp999"
    # No-prefix package: detected by the "+spN" version suffix
    - bucket: "django"
      pairs:
        - key: "CVE-2023-36053"
          value:
            PatchedVersions:
              - "4.2.8+sp999"
            VulnerableVersions:
